spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/product
    username: orang
    password: rahasia
  jpa:
    hibernate:
      ddl-auto: create
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: orderConfirmation:com.sdh.ecommerce.models.OrderConfirmation
server:
  port: 8070

application:
  config:
    customer-svc-url: http://localhost:8222/api/v1/customers
    product-svc-url: http://localhost:8222/api/v1/products
    payment-svc-url: http://localhost:8222/api/v1/payments